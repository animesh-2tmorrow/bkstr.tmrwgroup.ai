server {
    listen 80;
    listen [::]:80;
    server_name bkstr.tmrwgroup.ai;
    return 301 https://$host$request_uri;
}

server {
    # http2 enabled via listen-line parameter for nginx 1.24 (Ubuntu 24.04 stock).
    # The standalone `http2 on;` directive is nginx 1.25+; do not use until/unless
    # we move off Ubuntu 24.04's repo nginx — see follow-up #5.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bkstr.tmrwgroup.ai;

    # Reuse certbot-issued cert from Step 6.
    ssl_certificate     /etc/letsencrypt/live/bkstr.tmrwgroup.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bkstr.tmrwgroup.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
