version: 0.0
os: linux

files:
  - source: /
    destination: /var/www/bkstr
    overwrite: true

permissions:
  - object: /var/www/bkstr
    pattern: "**"
    owner: ubuntu
    group: ubuntu

hooks:
  ApplicationStop:
    - location: scripts/stop-app.sh
      timeout: 30
      runas: root
  BeforeInstall:
    - location: scripts/before-install.sh
      timeout: 300
      runas: root
  ApplicationStart:
    - location: scripts/application-start.sh
      timeout: 60
      runas: root
  ValidateService:
    - location: scripts/validate-service.sh
      timeout: 60
      runas: root
