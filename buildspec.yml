version: 0.2

env:
  shell: bash

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies (including devDependencies) with npm ci..."
      - npm ci --include=dev
  build:
    commands:
      - echo "Generating Prisma client..."
      - npx prisma generate
      - echo "Building Next.js application..."
      - npm run build
      - echo "Pruning devDependencies for runtime artifact..."
      - npm prune --omit=dev
  post_build:
    commands:
      - echo "Ensuring hook scripts are executable..."
      - chmod +x scripts/*.sh

artifacts:
  enable-symlinks: yes
  files:
    - "**/*"
    - ".next/**/*"
    - "node_modules/**/*"
  exclude-paths:
    - ".git/**/*"
    - ".github/**/*"
    - "node_modules/.cache/**/*"
    - ".next/cache/**/*"
